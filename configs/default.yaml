# CoralSAM-Track default configuration
# All paths are relative to the project root (where this repo lives)

# ---------------------------------------------------------------------------
# Dataset
# ---------------------------------------------------------------------------
data_root: partial_coralvos/partial   # contains images/<video>/*.jpg and masks/<video>/*.png

# ---------------------------------------------------------------------------
# Initialization method for the first frame
# Options: "sam2_auto" | "coralscop"
#   sam2_auto  : Use SAM2 image predictor with grid-based automatic prompting.
#                No extra weights needed beyond the SAM2 checkpoint.
#   coralscop  : Use CoralSCOP (SAM-based coral-specific detector).
#                Requires segment-anything installed and coralscop.checkpoint.
# ---------------------------------------------------------------------------
init_method: sam2_auto

# ---------------------------------------------------------------------------
# SAM2 settings
# ---------------------------------------------------------------------------
sam2:
  checkpoint: checkpoints/sam2.1_hiera_large.pt
  # Config path relative to sam2 package install location.
  # After installing sam2, this resolves to sam2/configs/sam2.1/sam2.1_hiera_l.yaml
  config: configs/sam2.1/sam2.1_hiera_l.yaml
  model_size: large   # tiny | small | base_plus | large
  # Keep video frames on CPU and move to GPU per-frame during tracking.
  # True = much lower GPU memory (recommended for long videos / shared GPU).
  # False = all frames on GPU, faster but can OOM on 24GB with 400+ frames.
  offload_video_to_cpu: false
  # Grid prompting for SAM2-Auto init (only used when GT first frame unavailable)
  grid_size: 16       # NxN grid of candidate points on first frame
  min_mask_area: 500  # pixels – discard tiny spurious masks
  score_thresh: 0.70  # SAM2 iou_predictions threshold for keeping a mask
  # Area budget: merged auto-init mask is capped at this fraction of frame pixels.
  # Prevents the union of many accepted masks from covering half the image.
  max_area_frac: 0.30

# ---------------------------------------------------------------------------
# CoralSCOP settings (only used when init_method: coralscop)
# ---------------------------------------------------------------------------
coralscop:
  checkpoint: checkpoints/vit_b_coralscop.pth
  model_type: vit_b
  points_per_side: 32
  pred_iou_thresh: 0.72
  stability_score_thresh: 0.62
  min_mask_region_area: 500

# ---------------------------------------------------------------------------
# Drift detection
# ---------------------------------------------------------------------------
drift:
  enabled: true
  conf_thresh: 0.70
  area_ratio_thresh: 1.5
  # Sensitive detection: check every 2 frames, single signal can trigger.
  # The two-tier reinit strategy handles the safety (memory flush vs keyframe rewind).
  check_interval: 2
  iou_thresh: 0.10
  ema_alpha: 0.4
  consecutive_low_conf: 1
  use_prev_mask_for_reinit: true
  # Gate only applies to HARD reinit (keyframe rewind / auto_init).
  # Memory flush (soft reinit) skips the gate — it's generally safe.
  reinit_gate_enabled: true
  reinit_gate_delta_conf: 0.05
  reinit_gate_delta_iou: 0.05
  # Short cooldown: allow repeated memory flushes (which help video97/98).
  cooldown_frames: 4
  # min_signals=1: any single drift signal triggers. Safety is handled
  # by the two-tier reinit strategy, not by suppressing detection.
  min_signals: 1
  max_reinits_per_seq: 30
  proactive_reinit_interval: 0
  # Zone-based reinit limiting: prevent keyframe rewind loops.
  # A "zone" groups nearby frames; reinit attempts are capped per zone.
  zone_size: 20                 # frames per zone
  max_rewinds_per_zone: 3       # keyframe rewind attempts before falling through to auto_init
  max_reinits_per_zone: 5       # hard reinits per zone before zone is skipped (soft reinits are free)
  end_skip_frac: 0.05           # skip drift detection in last 5% of sequence

# ---------------------------------------------------------------------------
# Keyframe checkpointing — two-tier reinit
# On drift detection, compare current mask IoU against most recent keyframe:
#   IoU > divergence_iou_thresh → soft reinit (memory flush, no gate)
#   IoU ≤ divergence_iou_thresh → hard reinit (keyframe rewind, with gate)
# ---------------------------------------------------------------------------
keyframe:
  conf_thresh: 0.88
  min_interval: 10
  max_rewind_distance: 100
  # IoU threshold between current mask and most recent keyframe.
  # Above this → mask is still roughly on target → memory flush is safe.
  # Below this → mask has diverged → need keyframe rewind.
  divergence_iou_thresh: 0.25

# ---------------------------------------------------------------------------
# Bidirectional refinement — second pass
# ---------------------------------------------------------------------------
bidirectional_refinement:
  enabled: true
  conf_margin: 0.02
  min_improvement_frames: 5
  # Baseline safety net: re-propagate from GT init frame. When the baseline
  # and drift-corrected masks diverge (IoU < safety_iou_thresh), prefer the
  # baseline if it has a non-trivial mask. This catches cases where drift
  # correction (e.g. auto_init) tracked the wrong target.
  safety_net: true
  safety_iou_thresh: 0.3   # below this IoU, masks are considered diverged
  anchor_agree_thresh: 0.6 # Pass 1: IoU above this means masks agree (no replacement)

# ---------------------------------------------------------------------------
# Post-processing
# ---------------------------------------------------------------------------
postprocess:
  # Apply morphological operations to predicted masks before saving.
  # binary_fill_holes removes interior gaps → improves J (region IoU).
  # binary_closing smooths ragged edges → improves F (contour score).
  morphology: true
  close_size: 5    # Structuring element size for binary_closing (pixels)

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output:
  base_dir: outputs
  save_masks: true          # Save predicted binary masks as PNG
  save_vis: true            # Save coloured overlay visualisations
  vis_alpha: 0.5            # Overlay transparency
  vis_color: [0, 255, 128]  # BGR – coral green
  fps_log: true             # Print per-sequence FPS summary
